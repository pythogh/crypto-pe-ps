<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>token.pe</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-annotation/3.0.1/chartjs-plugin-annotation.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream:     #F2EDE4;
      --cream2:    #EAE3D8;
      --parchment: #D9CEBC;
      --sand:      #C4B49A;
      --sienna:    #9A7B5A;
      --umber:     #6B4F35;
      --ink:       #2C2417;
      --white:     #FFFFFF;
      --orange:    #C96B2F;
      --green:     #3D6B4F;
      --blue:      #4A6FA5;
      --red:       #8B3A3A;
      --border:    1px solid var(--parchment);
      --serif:     'EB Garamond', Georgia, serif;
      --mono:      'DM Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--cream); color: var(--ink); font-family: var(--serif);
      padding: 36px 28px 60px; max-width: 1060px; margin: 0 auto;
    }

    header {
      display: flex; justify-content: space-between; align-items: baseline;
      padding-bottom: 16px; border-bottom: var(--border); margin-bottom: 24px;
    }
    .logo { font-size: 20px; font-weight: 600; letter-spacing: -.02em; }
    .logo em { color: var(--orange); font-style: normal; }
    #updated { font-family: var(--mono); font-size: 11px; color: var(--sand); }

    /* ── Tabs ── */
    .tabs {
      display: flex; gap: 0; margin-bottom: 24px;
      border-bottom: var(--border);
    }
    .tab-btn {
      font-family: var(--mono); font-size: 11px; text-transform: uppercase;
      letter-spacing: .06em; padding: 8px 28px 10px;
      background: none; border: none; cursor: pointer;
      color: var(--sand); transition: color .15s;
      position: relative; bottom: -1px;
    }
    .tab-btn:hover { color: var(--sienna); }
    .tab-btn.active {
      color: var(--ink);
      border-bottom: 2px solid var(--ink);
    }

    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .time-filters { display: flex; gap: 4px; }
    .tf-btn {
      font-family: var(--mono); font-size: 10px; padding: 4px 10px;
      border: var(--border); border-radius: 4px; background: transparent;
      color: var(--sienna); cursor: pointer; transition: all .15s;
    }
    .tf-btn:hover  { background: var(--cream2); }
    .tf-btn.active { background: var(--umber); color: var(--cream); border-color: var(--umber); }

    /* ── Loading ── */
    #loading {
      font-family: var(--mono); font-size: 12px; color: var(--sienna);
      padding: 60px 0; text-align: center;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    #loading { animation: pulse 1.4s ease-in-out infinite; }

    /* ── TABLE TAB ── */
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    thead th {
      font-family: var(--mono); font-size: 10px; text-transform: uppercase;
      letter-spacing: .07em; color: var(--sienna); padding: 18px 10px 12px;
      text-align: right; border-bottom: var(--border); font-weight: 400; white-space: nowrap;
    }
    thead th:first-child { text-align: left; }
    thead th.sortable { cursor: pointer; user-select: none; transition: color .15s; }
    thead th.sortable:hover { color: var(--umber); }
    thead th.sort-active { color: var(--ink); }
    .sort-icon { font-size: 10px; margin-left: 2px; }

    tbody tr.coin-row { border-bottom: var(--border); cursor: default; transition: background .12s; }
    tbody tr.coin-row:hover { background: var(--cream2); }
    tbody tr.selected-coin { background: var(--cream2); border-left: 2px solid var(--orange); }
    tbody td { padding: 12px 10px; vertical-align: middle; }

    td.td-name { display: flex; align-items: center; gap: 10px; }
    .coin-logo { width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0; background: var(--cream2); }
    .coin-name { font-weight: 500; font-size: 15px; line-height: 1.2; }
    .coin-sym  { font-family: var(--mono); font-size: 10px; color: var(--sienna); letter-spacing: .05em; }

    td.num  { text-align: right; font-variant-numeric: tabular-nums; }
    td.pos  { color: var(--green); font-family: var(--mono); font-size: 12px; text-align: right; }
    td.neg  { color: var(--red);   font-family: var(--mono); font-size: 12px; text-align: right; }
    td.na   { color: var(--sand);  font-family: var(--mono); font-size: 11px; text-align: right; }
    .pe-val  { color: var(--orange); font-weight: 500; }
    .fdv-val { color: var(--green);  font-weight: 500; }

    /* ── COMPARE TAB ── */




    .coin-selector {
      display: flex; flex-wrap: wrap; gap: 6px;
    }
    .coin-chip {
      display: flex; align-items: center; gap: 5px;
      font-family: var(--mono); font-size: 10px; padding: 4px 10px;
      border: var(--border); border-radius: 20px; background: var(--white);
      cursor: pointer; transition: all .15s; user-select: none;
    }
    .coin-chip img { width: 14px; height: 14px; border-radius: 50%; }
    .coin-chip.active { color: var(--white); border-color: transparent; }
    .coin-chip:hover { opacity: .85; }

    .compare-chart-wrap {
      background: var(--white); border: var(--border); border-radius: 6px;
      padding: 20px 20px 16px;
    }
    .compare-chart-box { position: relative; height: 340px; }

    .compare-legend {
      display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px;
    }
    .compare-legend-item {
      display: flex; align-items: center; gap: 5px;
      font-family: var(--mono); font-size: 10px; color: var(--sienna);
    }
    .compare-legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    footer {
      margin-top: 44px; padding-top: 14px; border-top: var(--border);
      font-family: var(--mono); font-size: 10px; color: var(--sand);
    }
  </style>
</head>
<body>

<header>
  <div class="logo">token<em>.</em>pe</div>
  <div id="updated"><span style="color:var(--sienna)">Last update</span> <span id="update-time">—</span></div>
</header>

<!-- Tabs -->
<div class="tabs">
  <button class="tab-btn active" data-tab="compare">⇄ Compare</button>
  <button class="tab-btn" data-tab="tableau">≡ Table</button>
</div>

<div id="loading">
  <div style="font-family:var(--mono);font-size:12px;color:var(--sienna);margin-bottom:12px" id="loading-text">Fetching data…</div>
  <div style="width:200px;height:3px;background:var(--parchment);border-radius:2px;margin:0 auto">
    <div id="loading-bar" style="width:0%;height:100%;background:var(--orange);border-radius:2px;transition:width .3s ease"></div>
  </div>
</div>

<!-- ── TAB : Tableau ── -->
<div class="tab-pane" id="tab-tableau">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
    <div style="font-family:var(--mono);font-size:10px;color:var(--sienna)">Rev. ann. = Rev. 30d × 12</div>
    <div style="display:flex;gap:10px;font-family:var(--mono);font-size:9px;color:var(--sand)">
      <span>P/E :</span>
      <span style="color:#16a34a">■ &lt;10</span>
      <span style="color:#ca8a04">■ 10–25</span>
      <span style="color:#dc2626">■ &gt;25</span>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Protocol</th>
        <th class="sortable" data-key="price">Prix <span class="sort-icon"></span></th>
        <th class="sortable" data-key="change24h">24h <span class="sort-icon"></span></th>
        <th class="sortable sort-active sort-desc" data-key="mcap">Mcap <span class="sort-icon">↓</span></th>
        <th class="sortable" data-key="fdv">FDV <span class="sort-icon"></span></th>
        <th style="width:60px"></th>

        <th class="sortable" data-key="rev30d">Rev. 30d <span class="sort-icon"></span></th>
        <th class="sortable" data-key="revAnn">Rev. ann. <span class="sort-icon"></span></th>
        <th class="sortable" data-key="pe">P/E <span class="sort-icon"></span></th>
        <th class="sortable" data-key="fdve">FDV/E <span class="sort-icon"></span></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<!-- ── TAB : Comparatif ── -->
<div class="tab-pane active" id="tab-compare">

  <!-- Controls row -->
  <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:20px;flex-wrap:wrap">
    <div style="display:flex;flex-direction:column;gap:10px">

      <div class="coin-selector" id="coin-selector"></div>
    </div>

  </div>

  <!-- Two charts -->
  <div style="display:flex;flex-direction:column;gap:16px">
    <div class="compare-chart-wrap">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div style="font-family:var(--mono);font-size:9px;color:var(--sienna);text-transform:uppercase;letter-spacing:.08em">P/E ratio</div>
        <div class="time-filters" id="global-filters">
          <button class="tf-btn" data-days="7">7d</button>
          <button class="tf-btn" data-days="30">1m</button>
          <button class="tf-btn" data-days="90">3m</button>
          <button class="tf-btn" data-days="180">6m</button>
          <button class="tf-btn active" data-days="365">1y</button>
        </div>
      </div>
      <div class="compare-chart-box"><canvas id="compare-chart-pe" role="img" aria-label="P/E comparatif"></canvas></div>
      <div class="compare-legend" id="compare-legend-pe"></div>
    </div>
    <div class="compare-chart-wrap">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div style="font-family:var(--mono);font-size:9px;color:var(--sienna);text-transform:uppercase;letter-spacing:.08em">Rolling 30d revenue</div>
        <div class="time-filters" id="rev-filters">
          <button class="tf-btn" data-days="7">7d</button>
          <button class="tf-btn" data-days="30">1m</button>
          <button class="tf-btn" data-days="90">3m</button>
          <button class="tf-btn" data-days="180">6m</button>
          <button class="tf-btn active" data-days="365">1y</button>
        </div>
      </div>
      <div class="compare-chart-box"><canvas id="compare-chart-rev" role="img" aria-label="Revenue 30j comparatif"></canvas></div>
      <div class="compare-legend" id="compare-legend-rev"></div>
    </div>
    <div class="compare-chart-wrap">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div style="font-family:var(--mono);font-size:9px;color:var(--sienna);text-transform:uppercase;letter-spacing:.08em">Daily revenue</div>
        <div class="time-filters" id="daily-filters">
          <button class="tf-btn" data-days="7">7d</button>
          <button class="tf-btn active" data-days="30">1m</button>
          <button class="tf-btn" data-days="90">3m</button>
          <button class="tf-btn" data-days="180">6m</button>
          <button class="tf-btn" data-days="365">1y</button>
        </div>
      </div>
      <div class="compare-chart-box"><canvas id="compare-chart-daily" role="img" aria-label="Daily revenue"></canvas></div>
      <div class="compare-legend" id="compare-legend-daily"></div>
    </div>
  </div>

</div>

<footer>Data: CoinGecko · DefiLlama — for informational purposes only</footer>

<script>
const COINS = [
  { cgId: 'hyperliquid',             llamaSlug: 'hyperliquid'   },
  { cgId: 'pump-fun',                llamaSlug: 'pump'          },
  { cgId: 'aave',                    llamaSlug: 'aave'          },
  { cgId: 'lido-dao',                llamaSlug: 'lido'          },
  { cgId: 'ether-fi',                llamaSlug: 'ether.fi'      },
  { cgId: 'syrup',                   llamaSlug: 'maple-finance' },
  { cgId: 'railgun',                 llamaSlug: 'railgun'       },
  { cgId: 'sky',                     llamaSlug: 'sky'           },
  { cgId: 'derive',                  llamaSlug: 'derive'        },
  { cgId: 'kinetiq',                 llamaSlug: 'kinetiq'       },
  { cgId: 'pendle',                  llamaSlug: 'pendle'        },
  { cgId: 'jupiter-exchange-solana', llamaSlug: 'jupiter'       },
  { cgId: 'lighter',                 llamaSlug: 'lighter'       },
  { cgId: 'aerodrome-finance',       llamaSlug: 'aerodrome'     },
  { cgId: 'meteora',                 llamaSlug: 'meteora'       },
  { cgId: 'gmx',                     llamaSlug: 'gmx'           },
  { cgId: 'fluid',                   llamaSlug: 'fluid'         },
  { cgId: 'raydium',                 llamaSlug: 'raydium'       },
  { cgId: 'uniswap',                 llamaSlug: 'uniswap'       },
  { cgId: 'helium',                  llamaSlug: 'helium'        },
  { cgId: 'bluefin',                 llamaSlug: 'bluefin'       },
  { cgId: 'ethena',                  llamaSlug: 'ethena'        },
];

// Couleurs des brands crypto
const BRAND_COLORS = {
  'hyperliquid':             '#00D4C8',
  'pump-fun':                '#00C853',
  'aave':                    '#9896FF',
  'lido-dao':                '#F0A500',
  'ether-fi':                '#6C5CE7',
  'syrup':                   '#F97316',
  'railgun':                 '#7C3AED',
  'sky':                     '#F4C430',
  'derive':                  '#D4420A',
  'kinetiq':                 '#00B4D8',
  'pendle':                  '#3D9BE9',
  'jupiter-exchange-solana': '#16A34A',
  'lighter':                 '#1a1a1a',
  'aerodrome-finance':       '#FF0420',
  'meteora':                 '#AB47BC',
  'gmx':                     '#4FC3F7',
  'fluid':                   '#00BFA5',
  'raydium':                 '#6366F1',
  'uniswap':                 '#FF007A',
  'helium':                  '#474DFF',
  'bluefin':                 '#1B9BE0',
  'ethena':                  '#1a1a2e',
};

const FALLBACK_PALETTE = [
  '#C96B2F','#4A6FA5','#3D6B4F','#9B59B6','#E67E22',
  '#1ABC9C','#E74C3C','#2980B9','#F39C12','#16A085',
];

function getCoinColor(d, idx) {
  return BRAND_COLORS[d.cgId] || FALLBACK_PALETTE[idx % FALLBACK_PALETTE.length];
}

let allData    = [];
let globalDays = 365;  // PE chart
let revDays    = 365;  // Rolling 30d chart
let dailyDays  = 30;   // Daily revenue chart

let selectedCoins   = new Set();
let compareChartRev   = null;
let compareChartPE    = null;
let compareChartDaily = null;
let selectedCoinIdx   = null;

function buildCoinDetailChart(d, canvasId, showZones) {
  if (!d || !d.prices?.length) return;

  // Update header

  const days = 365;
  const cutoff = Date.now() - days * 86400000;
  const src    = d.prices.filter(([ts]) => ts >= cutoff);
  const use    = src.length >= 2 ? src : d.prices;
  const labels = use.map(([ts]) => new Date(ts).toLocaleDateString('en-GB', { day:'numeric', month:'short' }));
  const prices = use.map(([,p]) => p);
  const pNow   = prices[prices.length - 1] || 1;

  // P/E series
  let peArr = null;
  if (d.rev?.history?.length && d.mcap) {
    const rh = d.rev.history;
    const tmp = use.map(([ts, price]) => {
      const w = rh.filter(([t]) => t >= ts - 30*86400000 && t <= ts);
      if (w.length < 3) return null;
      const revAnn = w.reduce((s,[,v])=>s+v,0) * 12;
      return revAnn > 0 ? +((d.mcap * (price/pNow)) / revAnn).toFixed(2) : null;
    });
    if (tmp.filter(v=>v!==null).length >= use.length * 0.3) peArr = tmp;
  }

  const datasets = [{
    label: 'Price', data: prices, yAxisID: 'yP',
    borderColor: getCoinColor(d, d._idx),
    backgroundColor: getCoinColor(d, d._idx) + '15',
    borderWidth: 1.5, pointRadius: 0, tension: 0.4, fill: true,
  }];
  if (peArr) datasets.push({
    label: 'P/E', data: peArr, yAxisID: 'yPE',
    borderColor: '#9A7B5A',
    backgroundColor: 'transparent',
    borderWidth: 1.5, borderDash: [3,4], pointRadius: 0, tension: 0.4, spanGaps: true,
  });

  const canvas = document.getElementById(canvasId);
  if (!canvas) return;

  // Destroy any stale Chart.js instance on this canvas
  const existing = Chart.getChart(canvas);
  if (existing) existing.destroy();

  // Hardcode dimensions — canvas in <tr> can't be measured reliably
  canvas.width  = 1000;
  canvas.height = 220;
  canvas.style.width  = '100%';
  canvas.style.height = '220px';

  const newChart = new Chart(canvas, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#2C2417',
          titleFont: { family:"'DM Mono',monospace", size:9 },
          bodyFont:  { family:"'DM Mono',monospace", size:10 },
          padding: 9,
          callbacks: {
            label: c => c.dataset.label === 'Price'
              ? ' price: ' + (fmtP(c.parsed.y)||'—')
              : ' p/e: '   + c.parsed.y.toFixed(1) + 'x',
          },
        },
        annotation: {
          annotations: (!showZones ? {} : (() => {
            const v = computeValuation(d);
            if (!v || !peArr) return {};
            return {
              zCheap: {
                type: 'box', yScaleID: 'yPE',
                yMin: 0, yMax: v.p20,
                backgroundColor: 'rgba(22,163,74,0.08)',
                borderWidth: 0,
              },
              zExpensive: {
                type: 'box', yScaleID: 'yPE',
                yMin: v.p80, yMax: v.p80 * 3,
                backgroundColor: 'rgba(220,38,38,0.07)',
                borderWidth: 0,
              },
              lP20: {
                type: 'line', yScaleID: 'yPE',
                yMin: v.p20, yMax: v.p20,
                borderColor: 'rgba(22,163,74,0.4)',
                borderWidth: 1, borderDash: [4, 3],
                label: {
                  content: 'cheap < ' + v.p20.toFixed(0) + 'x',
                  display: true, position: 'start',
                  color: 'rgba(22,163,74,0.7)',
                  font: { family: "'DM Mono',monospace", size: 8 },
                  backgroundColor: 'transparent', padding: 2,
                },
              },
              lP80: {
                type: 'line', yScaleID: 'yPE',
                yMin: v.p80, yMax: v.p80,
                borderColor: 'rgba(220,38,38,0.4)',
                borderWidth: 1, borderDash: [4, 3],
                label: {
                  content: 'expensive > ' + v.p80.toFixed(0) + 'x',
                  display: true, position: 'start',
                  color: 'rgba(220,38,38,0.7)',
                  font: { family: "'DM Mono',monospace", size: 8 },
                  backgroundColor: 'transparent', padding: 2,
                },
              },
            };
          })()),
        },
      },
      scales: {
        x: {
          grid: { color: 'rgba(180,160,130,0.1)' }, border: { display: false },
          ticks: { font:{family:"'DM Mono',monospace",size:8}, color:'#9A7B5A', maxTicksLimit:8 },
        },
        yP: {
          position: 'left', grid: { color: 'rgba(180,160,130,0.1)' }, border: { display: false },
          ticks: { font:{family:"'DM Mono',monospace",size:8}, color: getCoinColor(d, d._idx), callback: v => fmtP(v)||'' },
        },
        yPE: {
          position: 'right', display: !!peArr, grid: { display: false }, border: { display: false },
          ticks: { font:{family:"'DM Mono',monospace",size:8}, color:'#9A7B5A', callback: v => v.toFixed(0)+'x' },
        },
      },
    },
  });
}

// ── Formatters ────────────────────────────────────────────────────────────────
function fmt(n) {
  if (n == null || isNaN(n)) return null;
  if (n === 0) return '$0';
  const a = Math.abs(n);
  if (a >= 1e12) return '$' + (n/1e12).toFixed(2) + 'T';
  if (a >= 1e9)  return '$' + (n/1e9).toFixed(2)  + 'B';
  if (a >= 1e6)  return '$' + (n/1e6).toFixed(2)  + 'M';
  if (a >= 1e3)  return '$' + (n/1e3).toFixed(1)  + 'K';
  return '$' + n.toFixed(2);
}
function fmtP(n) {
  if (n == null) return null;
  if (n >= 1000) return '$' + n.toLocaleString('en-US', { maximumFractionDigits: 0 });
  if (n >= 1)    return '$' + n.toFixed(2);
  return '$' + n.toPrecision(4);
}
function cell(val, cls = 'num') {
  return val ? `<td class="${cls}">${val}</td>` : `<td class="na">—</td>`;
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab === 'compare') buildCompareChart();
  });
});

// ── Sort ──────────────────────────────────────────────────────────────────────
let sortKey = 'mcap', sortDir = 'desc';

function getSortVal(d, key) {
  switch(key) {
    case 'price':        return d.price             ?? -Infinity;
    case 'change24h':    return d.change24h          ?? -Infinity;
    case 'mcap':         return d.mcap               ?? -Infinity;
    case 'fdv':          return d.fdv                ?? -Infinity;

    case 'rev30d':       return d.rev?.rev30d        ?? -Infinity;
    case 'revAnn':       return d.rev?.revAnn        ?? -Infinity;
    case 'pe':   return (d.rev?.revAnn>0&&d.mcap) ? d.mcap/d.rev.revAnn : Infinity;
    case 'fdve': return (d.rev?.revAnn>0&&d.fdv)  ? d.fdv /d.rev.revAnn : Infinity;
    default:     return -Infinity;
  }
}


function computeValuation(d) {
  if (!d.prices?.length || !d.mcap || !d.rev?.history?.length || !d.rev?.revAnn) return null;
  const rh   = d.rev.history;
  const pNow = d.prices[d.prices.length - 1]?.[1] || 1;
  const cutoff = Date.now() - 365 * 86400000;
  const src  = d.prices.filter(([ts]) => ts >= cutoff);
  if (src.length < 30) return null;

  const peHistory = src.map(([ts, prix]) => {
    const w = rh.filter(([t]) => t >= ts - 30*86400000 && t <= ts);
    if (w.length < 5) return null;
    const revAnn = w.reduce((s,[,v]) => s+v, 0) * 12;
    if (revAnn <= 0) return null;
    return (d.mcap * (prix / pNow)) / revAnn;
  }).filter(v => v !== null);

  if (peHistory.length < 30) return null;

  const sorted  = [...peHistory].sort((a, b) => a - b);
  const p20     = sorted[Math.floor(sorted.length * 0.20)];
  const p80     = sorted[Math.floor(sorted.length * 0.80)];
  const current = d.mcap / d.rev.revAnn;

  if (current <= p20)      return { label: 'Cheap',     color: '#16a34a', bg: 'rgba(22,163,74,0.1)',  p20, p80, current };
  else if (current <= p80) return { label: 'Fair',      color: '#ca8a04', bg: 'rgba(202,138,4,0.1)',  p20, p80, current };
  else                     return { label: 'Expensive', color: '#dc2626', bg: 'rgba(220,38,38,0.1)', p20, p80, current };
}

    if (av === -Infinity && bv === -Infinity) return 0;
    if (av === -Infinity) return 1;  if (bv === -Infinity) return -1;
    return sortDir === 'desc' ? bv - av : av - bv;

// ── Compare : chart ───────────────────────────────────────────────────────────
function getMetricSeries(d, metric, days) {
  const cutoff = Date.now() - days * 86400000;


  if (metric === 'rev30d') {
    if (!d.rev?.history?.length) return { labels: [], data: [] };
    const rh  = d.rev.history.filter(([ts]) => ts >= cutoff);
    const use = rh.length >= 2 ? rh : d.rev.history.slice(-Math.min(days, d.rev.history.length));
    // Rolling 30j
    const data = use.map(([ts, ]) => {
      const w = d.rev.history.filter(([t]) => t >= ts - 30*86400000 && t <= ts);
      return w.length >= 3 ? +w.reduce((s,[,v])=>s+v,0).toFixed(0) : null;
    });
    return {
      labels: use.map(([ts]) => new Date(ts).toLocaleDateString('en-GB', { day:'numeric', month:'short' })),
      data,
    };
  }

  if (metric === 'pe') {
    if (!d.prices?.length || !d.mcap || !d.rev?.history?.length) return { labels: [], data: [] };
    const src = d.prices.filter(([ts]) => ts >= cutoff);
    const use = src.length >= 2 ? src : d.prices.slice(-Math.min(days, d.prices.length));
    const pNow = d.prices[d.prices.length - 1]?.[1] || 1;
    const data = use.map(([ts, prix]) => {
      const w = d.rev.history.filter(([t]) => t >= ts - 30*86400000 && t <= ts);
      if (w.length < 3) return null;
      const revAnn = w.reduce((s,[,v])=>s+v,0) * 12;
      if (revAnn <= 0) return null;
      return +((d.mcap * (prix / pNow)) / revAnn).toFixed(2);
    });
    return {
      labels: use.map(([ts]) => new Date(ts).toLocaleDateString('en-GB', { day:'numeric', month:'short' })),
      data,
    };
  }
  if (metric === 'rev_daily') {
    if (!d.rev?.history?.length) return { labels: [], data: [] };
    const rh  = d.rev.history.filter(([ts]) => ts >= cutoff);
    const use = rh.length >= 2 ? rh : d.rev.history.slice(-Math.min(days, d.rev.history.length));
    return {
      labels: use.map(([ts]) => new Date(ts).toLocaleDateString('en-GB', { day:'numeric', month:'short' })),
      data:   use.map(([, v]) => v || 0),
    };
  }
  return { labels: [], data: [] };
}

function makeCompareChart(canvasId, legendId, metric, active, existingChart, days) {
  days = days || globalDays;
  const legend = document.getElementById(legendId);
  legend.innerHTML = '';

  const isDaily   = metric === 'rev_daily';
  const isRevFlag = metric === 'rev30d' || metric === 'rev_daily';
  const tickCb    = isRevFlag ? v => fmt(v)||'' : v => v.toFixed(0)+'x';
  const ttCb      = isRevFlag ? v => fmt(v)||'—' : v => v.toFixed(1)+'x';

  // Filter coins with sufficient data
  const filtered = metric === 'pe'
    ? active.filter(d => d.rev?.history?.length >= 5 && d.mcap)
    : active.filter(d => d.rev?.history?.length >= 3);
  const useActive = filtered.length ? filtered : [];

  // Build common timestamp-based X axis
  const cutoff = Date.now() - days * 86400000;

  // Collect raw timestamps, build sorted unique date list, format them
  const tsRaw = new Set();
  useActive.forEach(d => {
    const src = (d.prices || []).filter(([ts]) => ts >= cutoff);
    const use = src.length >= 2 ? src : (d.prices || []).slice(-Math.min(days, (d.prices||[]).length));
    use.forEach(([ts]) => tsRaw.add(Math.round(ts / 86400000) * 86400000)); // round to day
  });
  const sortedTs = Array.from(tsRaw).sort((a, b) => a - b);
  const sharedLabels = sortedTs.map(ts =>
    new Date(ts).toLocaleDateString('en-GB', { day:'numeric', month:'short' })
  );

  // Map each coin's data onto the shared timeline
  const datasets = useActive.map(d => {
    const color = getCoinColor(d, d._idx);
    // Build a ts→value map for this coin
    const src = (d.prices || []).filter(([ts]) => ts >= cutoff);
    const use = src.length >= 2 ? src : (d.prices || []).slice(-Math.min(days, (d.prices||[]).length));
    const pNow = use.length ? use[use.length-1][1] || 1 : 1;

    const valueMap = new Map();
    if (metric === 'price') {
      use.forEach(([ts, p]) => { valueMap.set(Math.round(ts/86400000)*86400000, p); });
    } else if (metric === 'rev30d') {
      const rh = d.rev?.history || [];
      use.forEach(([ts]) => {
        const dayTs = Math.round(ts/86400000)*86400000;
        const w = rh.filter(([t]) => t >= ts - 30*86400000 && t <= ts);
        if (w.length >= 3) valueMap.set(dayTs, +w.reduce((s,[,v])=>s+v,0).toFixed(0));
      });
    } else if (metric === 'pe') {
      const rh = d.rev?.history || [];
      use.forEach(([ts, prix]) => {
        const dayTs = Math.round(ts/86400000)*86400000;
        const w = rh.filter(([t]) => t >= ts - 30*86400000 && t <= ts);
        if (w.length < 3) return;
        const revAnn = w.reduce((s,[,v])=>s+v,0) * 12;
        if (revAnn <= 0) return;
        valueMap.set(dayTs, +((d.mcap * (prix/pNow)) / revAnn).toFixed(2));
      });
    } else if (metric === 'rev_daily') {
      const rh = d.rev?.history || [];
      rh.filter(([ts]) => ts >= cutoff).forEach(([ts, v]) => {
        valueMap.set(Math.round(ts/86400000)*86400000, v||0);
      });
    }

    // Map onto shared timeline — null for missing dates
    const data = sortedTs.map(ts => valueMap.has(ts) ? valueMap.get(ts) : null);

    return {
      label: d.symbol, data, borderColor: color,
      backgroundColor: 'transparent',
      borderWidth: 1.5, pointRadius: 0, tension: 0.35, spanGaps: true,
    };
  });

  // Override allLabels with shared ones
  const allLabels = sharedLabels;

  // Bar datasets (daily rev — filled solid)
  const barDatasets = useActive.map(d => {
    const barColor = getCoinColor(d, d._idx);
    const { data } = getMetricSeries(d, metric, days);
    return {
      label: d.symbol, data,
      backgroundColor: barColor,
      borderColor: 'transparent',
      borderWidth: 0, borderRadius: 2, borderSkipped: false,
    };
  });

  // Build legend
  useActive.forEach(d => {
    const item = document.createElement('div');
    item.className = 'compare-legend-item';
    item.innerHTML = `<span class="compare-legend-dot" style="background:${getCoinColor(d,d._idx)}"></span>${d.name}`;
    legend.appendChild(item);
  });

  // Update existing chart in-place
  if (existingChart) {
    existingChart.data.labels   = allLabels;
    existingChart.data.datasets = isDaily ? barDatasets : datasets;
    existingChart.options.scales.y.ticks.callback = tickCb;
    existingChart.update('none');
    return existingChart;
  }

  // First creation — fresh canvas
  const oldCanvas = document.getElementById(canvasId);
  if (!oldCanvas) return null;
  const wrapper = oldCanvas.parentElement;
  oldCanvas.remove();
  const canvas = document.createElement('canvas');
  canvas.id = canvasId;
  canvas.setAttribute('role', 'img');
  wrapper.appendChild(canvas);
  if (!useActive.length) return null;

  const endLabelsPlugin = {
    id: 'endLabels-' + canvasId,
    afterDraw(chart) {
      if (isDaily) return;
      const ctx  = chart.ctx;
      const area = chart.chartArea;
      const LINE_H = 15; // min vertical gap between labels
      // Collect
      const items = [];
      chart.data.datasets.forEach((ds) => {
        const meta   = chart.getDatasetMeta(chart.data.datasets.indexOf(ds));
        if (meta.hidden) return;
        const visPts = meta.data.filter(p => p && isFinite(p.x) && isFinite(p.y));
        if (!visPts.length) return;
        const last   = visPts[visPts.length - 1];
        const valArr = ds.data.filter(v => v != null && isFinite(v));
        if (!valArr.length) return;
        const val   = valArr[valArr.length - 1];
        const label = isRevFlag ? (fmt(val)||'') : val.toFixed(1) + 'x';
        items.push({ label, color: ds.borderColor, x: last.x, y: last.y });
      });
      if (!items.length) return;
      // Sort by y descending, then spread apart
      items.sort((a, b) => a.y - b.y);
      // Forward pass: push down
      for (let j = 1; j < items.length; j++) {
        if (items[j].y < items[j-1].y + LINE_H)
          items[j].y = items[j-1].y + LINE_H;
      }
      // Backward pass: pull up if pushed below bottom
      for (let j = items.length - 2; j >= 0; j--) {
        if (items[j].y > items[j+1].y - LINE_H)
          items[j].y = items[j+1].y - LINE_H;
      }
      ctx.font = "bold 10px 'DM Mono', monospace";
      items.forEach(({ label, color, x, y }) => {
        const w      = ctx.measureText(label).width;
        const goLeft = x + w + 10 > area.right;
        const px     = goLeft ? x - w - 5 : x + 5;
        const py     = Math.max(area.top + 12, Math.min(area.bottom - 3, y));
        ctx.save();
        // Background pill
        ctx.fillStyle = 'rgba(242,237,228,0.9)';
        ctx.fillRect(px - 3, py - 11, w + 6, 14);
        ctx.fillStyle = color;
        ctx.textAlign = 'left';
        ctx.fillText(label, px, py);
        ctx.restore();
      });
    }
  };

  const newChart = new Chart(canvas, {
    type: isDaily ? 'bar' : 'line',
    data: { labels: allLabels, datasets: isDaily ? barDatasets : datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#2C2417',
          titleFont: { family:"'DM Mono',monospace", size:10 },
          bodyFont:  { family:"'DM Mono',monospace", size:10 },
          padding: 10,
          filter: item => item.parsed.y !== null,
          callbacks: { label: c => ` ${c.dataset.label}: ${ttCb(c.parsed.y)}` },
        },
      },
      scales: {
        x: {
          stacked: false, grid: { color: 'rgba(180,160,130,0.1)' },
          border: { display: false },
          ticks: { font:{family:"'DM Mono',monospace",size:9}, color:'#9A7B5A', maxTicksLimit: isDaily ? 10 : 8 },
        },
        y: {
          position: 'left', grid: { color: 'rgba(180,160,130,0.1)' },
          border: { display: false },
          ticks: { font:{family:"'DM Mono',monospace",size:9}, color:'#9A7B5A', callback: tickCb },
        },
      },
    },
    plugins: [endLabelsPlugin],
  });

  // Drill-down click on bar
  if (isDaily) {
    canvas.addEventListener('click', (e) => {
      const pts = newChart.getElementsAtEventForMode(e, 'nearest', { intersect: true }, false);
      if (!pts.length) return;
      const dsIdx  = pts[0].datasetIndex;
      const barIdx = pts[0].index;
      const d      = useActive[dsIdx];
      if (!d) return;
      const date   = allLabels[barIdx];
      const barVal = newChart.data.datasets[dsIdx].data[barIdx];
      let popup = document.getElementById('drill-popup');
      if (!popup) {
        popup = document.createElement('div');
        popup.id = 'drill-popup';
        popup.style.cssText = 'position:fixed;background:#2C2417;color:#F2EDE4;font-family:"DM Mono",monospace;font-size:11px;padding:10px 14px;border-radius:6px;z-index:999;pointer-events:none;transition:opacity .2s';
        document.body.appendChild(popup);
      }
      popup.innerHTML = `<b style="color:${getCoinColor(d,d._idx)}">${d.name}</b><br>${date}<br>Rev: ${fmt(barVal)||'—'}`;
      popup.style.left    = (e.clientX + 12) + 'px';
      popup.style.top     = (e.clientY - 10) + 'px';
      popup.style.opacity = '1';
      clearTimeout(popup._timer);
      popup._timer = setTimeout(() => { popup.style.opacity = '0'; }, 2500);
    });
  }

  return newChart;
}


function buildCompareChart() {
  const active = allData.filter(d => selectedCoins.has(d._idx));
  if (!active.length) return;

  compareChartPE    = makeCompareChart('compare-chart-pe',    'compare-legend-pe',    'pe',        active, compareChartPE,    globalDays);
  compareChartRev   = makeCompareChart('compare-chart-rev',   'compare-legend-rev',   'rev30d',    active, compareChartRev,   revDays);
  compareChartDaily = makeCompareChart('compare-chart-daily', 'compare-legend-daily', 'rev_daily', active, compareChartDaily, dailyDays);
}

    const active = allData.filter(d => selectedCoins.has(d._idx));
    compareChartRev = makeCompareChart('compare-chart-rev', 'compare-legend-rev', 'rev30d', active, compareChartRev, revDays);
  }
  const btn2 = e.target.closest('#daily-filters .tf-btn');
  if (btn2) {
    dailyDays = parseInt(btn2.dataset.days);
    document.querySelectorAll('#daily-filters .tf-btn').forEach(b => b.classList.remove('active'));
    btn2.classList.add('active');
    const active = allData.filter(d => selectedCoins.has(d._idx));
    compareChartDaily = makeCompareChart('compare-chart-daily', 'compare-legend-daily', 'rev_daily', active, compareChartDaily, dailyDays);
  }
});

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  const loadEl = document.getElementById('loading');
  try {
    // Show progress during fetch


    const res = await fetch('/api/batch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(COINS),
    });

    if (!res.ok) throw new Error('Server HTTP ' + res.status);
    const data = await res.json();

    let ok = 0;
    data.forEach((d, i) => {
      if (!d.error) {
        d._idx = i; allData.push(d); ok++;

      }
      else console.warn('['+d.cgId+']', d.error);
    });

    // Par défaut : hyperliquid, pump-fun, aave
    const defaultIds = ['hyperliquid', 'pump-fun', 'syrup'];
    allData.forEach(d => {
      if (defaultIds.includes(d.cgId)) selectedCoins.add(d._idx);
    });

    loadEl.style.display = 'none';
    initSort();
    renderTable();
    buildCoinSelector();
    buildCompareChart(); // compare is default tab

    const updatedEl = document.getElementById('updated');
    const _now = new Date();
    updatedEl.textContent = ok+'/'+COINS.length+' coins · updated ' +
      _now.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) + ' ' +
      _now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    if (ok < COINS.length) {
      const failed = data.filter(d => d.error).map(d => d.cgId).join(', ');
      console.warn('Failed coins:', failed);
      updatedEl.title = 'Errors: ' + failed;
    }

  } catch(e) {
    loadEl.style.cssText = 'animation:none;color:#8B3A3A;padding:60px 0;text-align:center;font-family:var(--mono);font-size:12px';
    loadEl.textContent = '❌ ' + e.message;
    console.error(e);
  }
}

init();
</script>
