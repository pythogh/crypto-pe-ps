<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>token.pe</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-annotation/3.0.1/chartjs-plugin-annotation.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream:     #F2EDE4;
      --cream2:    #EAE3D8;
      --parchment: #D9CEBC;
      --sand:      #C4B49A;
      --sienna:    #9A7B5A;
      --umber:     #6B4F35;
      --ink:       #2C2417;
      --white:     #FFFFFF;
      --orange:    #C96B2F;
      --green:     #3D6B4F;
      --blue:      #4A6FA5;
      --red:       #8B3A3A;
      --border:    1px solid var(--parchment);
      --serif:     'EB Garamond', Georgia, serif;
      --mono:      'DM Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--cream); color: var(--ink); font-family: var(--serif);
      padding: 0 28px 60px; max-width: 1060px; margin: 0 auto;
    }
    header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 18px 0 14px;
      background: var(--cream);
      position: sticky; top: 0; z-index: 100;
    }
    .logo { font-size: 20px; font-weight: 600; letter-spacing: -.02em; }
    .logo em { color: var(--orange); font-style: normal; }
    #updated { font-family: var(--mono); font-size: 11px; color: var(--sand); }

    /* ── Tabs ── */
    .tabs {
      display: flex; gap: 8px; margin-bottom: 0; padding: 12px 0 14px;
      background: var(--cream);
      position: sticky; top: 66px; z-index: 99;
    }
    .tab-btn {
      font-family: var(--mono); font-size: 11px; text-transform: uppercase;
      letter-spacing: .06em; padding: 10px 28px 12px;
      background: none; border: none; cursor: pointer;
      color: var(--sand); transition: color .15s;
      position: relative; bottom: -1px;
    }
    .tab-btn:hover { color: var(--ink); }
    .tab-btn.active {
      color: var(--ink);
      border-bottom: 2px solid var(--ink);
    }

    .tab-pane { display: none; }
    .tab-pane.active {
      display: block;
      padding-top: 0;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .time-filters { display: flex; gap: 4px; }
    .tf-btn {
      font-family: var(--mono); font-size: 10px; padding: 4px 10px;
      border: var(--border); border-radius: 4px; background: transparent;
      color: var(--sienna); cursor: pointer; transition: all .15s;
    }
    .tf-btn:hover  { background: var(--cream2); }
    .tf-btn.active { background: var(--umber); color: var(--cream); border-color: var(--umber); }

    /* ── Loading ── */
    #loading {
      font-family: var(--mono); font-size: 12px; color: var(--sienna);
      padding: 60px 0; text-align: center;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    #loading { animation: pulse 1.4s ease-in-out infinite; }

    /* ── TABLE TAB ── */
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    thead th {
      font-family: var(--mono); font-size: 10px; text-transform: uppercase;
      letter-spacing: .07em; color: var(--sienna); padding: 12px 10px;
      text-align: right; border-bottom: var(--border); font-weight: 400; white-space: nowrap;
      position: sticky; top: 168px; background: var(--cream); z-index: 97; border-bottom: 2px solid var(--parchment) !important;
    }
    thead th:first-child { text-align: left; }
    thead th.sortable { cursor: pointer; user-select: none; transition: color .15s; }
    thead th.sortable:hover { color: var(--umber); }
    thead th.sort-active { color: var(--ink); }
    .sort-icon { font-size: 10px; margin-left: 2px; }

    tbody tr.coin-row { border-bottom: var(--border); cursor: default; transition: background .12s; }
    tbody tr.coin-row:hover { background: var(--cream2); }
    tbody tr.selected-coin { background: var(--cream2); }
    tbody td { padding: 12px 10px; vertical-align: middle; }

    td.td-name { display: flex; align-items: center; gap: 10px; }
    .coin-logo { width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0; background: var(--cream2); }
    .coin-name { font-weight: 500; font-size: 15px; line-height: 1.2; }
    .coin-sym  { font-family: var(--mono); font-size: 10px; color: var(--sienna); letter-spacing: .05em; }

    td.num  { text-align: right; font-variant-numeric: tabular-nums; }
    td.pos  { color: var(--green); font-family: var(--mono); font-size: 12px; text-align: right; }
    td.neg  { color: var(--red);   font-family: var(--mono); font-size: 12px; text-align: right; }
    td.na    { color: var(--sand);  font-family: var(--mono); font-size: 11px; text-align: right; }
    .pe-val  { color: var(--orange); font-weight: 500; }
    .fdv-val { color: var(--green);  font-weight: 500; }

    /* ── COMPARE TAB ── */
    .coin-selector {
      display: flex; flex-wrap: wrap; gap: 8px; overflow: visible;
    }
    .coin-chip {
      display: inline-flex; align-items: center; gap: 5px;
      font-family: var(--mono); font-size: 10px; padding: 6px 12px;
      border: var(--border); border-radius: 20px; background: var(--white);
      cursor: pointer; transition: all .15s; user-select: none; white-space: nowrap;
    }
    .coin-chip img { width: 14px; height: 14px; border-radius: 50%; }
    .coin-chip.active { color: var(--white); border-color: transparent; }
    .coin-chip:hover { opacity: .85; }

    .compare-chart-wrap {
      background: var(--white); border: var(--border); border-radius: 6px;
      padding: 20px 20px 16px;
    }
    .compare-chart-box { position: relative; height: 340px; }

    .compare-legend {
      display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px;
    }
    .compare-legend-item {
      display: flex; align-items: center; gap: 5px;
      font-family: var(--mono); font-size: 10px; color: var(--sienna);
    }
    .compare-legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    footer {
      margin-top: 44px; padding-top: 14px; border-top: var(--border);
      font-family: var(--mono); font-size: 10px; color: var(--sand);
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">token<em>.</em>pe</div>
    <div id="updated" style="font-family:var(--mono);font-size:10px;color:var(--sand);margin-top:3px"><span id="update-time">—</span></div>
  </div>
  <div class="time-filters" id="header-days-filter">
    <button class="tf-btn" data-days="7">7d</button>
    <button class="tf-btn" data-days="30">1m</button>
    <button class="tf-btn" data-days="90">3m</button>
    <button class="tf-btn" data-days="180">6m</button>
    <button class="tf-btn active" data-days="365">1y</button>
  </div>
</header>

<div class="tabs">
  <button class="tab-btn active" data-tab="compare">⇄ Compare</button>
  <button class="tab-btn" data-tab="tableau">≡ Table</button>
</div>

<div id="loading">
  <div style="font-family:var(--mono);font-size:12px;color:var(--sienna);margin-bottom:12px" id="loading-text">Fetching data…</div>
  <div style="width:200px;height:3px;background:var(--parchment);border-radius:2px;margin:0 auto">
    <div id="loading-bar" style="width:0%;height:100%;background:var(--orange);border-radius:2px;transition:width .3s ease"></div>
  </div>
</div>

<div class="tab-pane" id="tab-tableau">
  <div style="position:sticky;top:116px;z-index:98;background:var(--cream);padding:16px 0 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:0;border-bottom:var(--border);">
    <div style="font-family:var(--mono);font-size:10px;color:var(--sienna)">Rev. ann. = Rev. 30d × 12</div>
    <div style="display:flex;gap:10px;font-family:var(--mono);font-size:9px;color:var(--sand)">
      <span>P/E :</span>
      <span style="color:#16a34a">■ &lt;10</span>
      <span style="color:#ca8a04">■ 10–25</span>
      <span style="color:#dc2626">■ &gt;25</span>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th style="width:28px"></th>
        <th style="text-align:left">Protocol</th>
        <th class="sortable" data-key="price">Prix <span class="sort-icon"></span></th>
        <th class="sortable" data-key="change24h">24h <span class="sort-icon"></span></th>
        <th class="sortable sort-active sort-desc" data-key="mcap">Mcap <span class="sort-icon">↓</span></th>
        <th class="sortable" data-key="fdv">FDV <span class="sort-icon"></span></th>
        <th style="width:60px"></th>

        <th class="sortable" data-key="rev30d">Rev. 30d <span class="sort-icon"></span></th>
        <th class="sortable" data-key="revAnn">Rev. ann. <span class="sort-icon"></span></th>
        <th class="sortable" data-key="pe">P/E <span class="sort-icon"></span></th>
        <th class="sortable" data-key="fdve">FDV/E <span class="sort-icon"></span></th>
        <th style="text-align:right">Valuation</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="tab-pane active" id="tab-compare">

  <div style="position:sticky;top:116px;z-index:98;background:var(--cream);padding:16px 2px 14px;border-bottom:var(--border);margin-bottom:20px;">
    <div class="coin-selector" id="coin-selector"></div>
  </div>

  <div style="display:flex;flex-direction:column;gap:16px">
    <div class="compare-chart-wrap">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div style="font-family:var(--mono);font-size:9px;color:var(--sienna);text-transform:uppercase;letter-spacing:.08em">P/E ratio</div>
        <div class="time-filters" id="global-filters">
          <button class="tf-btn" data-days="7">7d</button>
          <button class="tf-btn" data-days="30">1m</button>
          <button class="tf-btn" data-days="90">3m</button>
          <button class="tf-btn" data-days="180">6m</button>
          <button class="tf-btn active" data-days="365">1y</button>
        </div>
      </div>
      <div class="compare-chart-box"><canvas id="compare-chart-pe" role="img" aria-label="P/E comparatif"></canvas></div>
      <div class="compare-legend" id="compare-legend-pe"></div>
    </div>
    <div class="compare-chart-wrap">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div style="font-family:var(--mono);font-size:9px;color:var(--sienna);text-transform:uppercase;letter-spacing:.08em">Rolling 30d revenue</div>
        <div class="time-filters" id="rev-filters">
          <button class="tf-btn" data-days="7">7d</button>
          <button class="tf-btn" data-days="30">1m</button>
          <button class="tf-btn" data-days="90">3m</button>
          <button class="tf-btn" data-days="180">6m</button>
          <button class="tf-btn active" data-days="365">1y</button>
        </div>
      </div>
      <div class="compare-chart-box"><canvas id="compare-chart-rev" role="img" aria-label="Revenue 30j comparatif"></canvas></div>
      <div class="compare-legend" id="compare-legend-rev"></div>
    </div>
    <div class="compare-chart-wrap">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div style="font-family:var(--mono);font-size:9px;color:var(--sienna);text-transform:uppercase;letter-spacing:.08em">Daily revenue</div>
        <div class="time-filters" id="daily-filters">
          <button class="tf-btn" data-days="7">7d</button>
          <button class="tf-btn active" data-days="30">1m</button>
          <button class="tf-btn" data-days="90">3m</button>
          <button class="tf-btn" data-days="180">6m</button>
          <button class="tf-btn" data-days="365">1y</button>
        </div>
      </div>
      <div class="compare-chart-box"><canvas id="compare-chart-daily" role="img" aria-label="Daily revenue"></canvas></div>
      <div class="compare-legend" id="compare-legend-daily"></div>
    </div>
  </div>

</div>

<footer>Data: CoinGecko · DefiLlama — for informational purposes only</footer>

<script>
const COINS = [
  { cgId: 'hyperliquid',             llamaSlug: 'hyperliquid'   },
  { cgId: 'pump-fun',                llamaSlug: 'pump'          },
  { cgId: 'aave',                    llamaSlug: 'aave'          },
  { cgId: 'lido-dao',                llamaSlug: 'lido'          },
  { cgId: 'ether-fi',                llamaSlug: 'ether.fi'      },
  { cgId: 'syrup',                   llamaSlug: 'maple-finance' },
  { cgId: 'railgun',                 llamaSlug: 'railgun'       },
  { cgId: 'sky',                     llamaSlug: 'sky'           },
  { cgId: 'derive',                  llamaSlug: 'derive'        },
  { cgId: 'kinetiq',                 llamaSlug: 'kinetiq'       },
  { cgId: 'pendle',                  llamaSlug: 'pendle'        },
  { cgId: 'jupiter-exchange-solana', llamaSlug: 'jupiter'       },
  { cgId: 'lighter',                 llamaSlug: 'lighter'       },
  { cgId: 'aerodrome-finance',       llamaSlug: 'aerodrome'     },
  { cgId: 'meteora',                 llamaSlug: 'meteora'       },
  { cgId: 'gmx',                     llamaSlug: 'gmx'           },
  { cgId: 'fluid',                   llamaSlug: 'fluid'         },
  { cgId: 'raydium',                 llamaSlug: 'raydium'       },
  { cgId: 'uniswap',                 llamaSlug: 'uniswap'       },
  { cgId: 'helium',                  llamaSlug: 'helium'        },
  { cgId: 'bluefin',                 llamaSlug: 'bluefin'       },
  { cgId: 'ethena',                  llamaSlug: 'ethena'        },
];

const BRAND_COLORS = {
  'hyperliquid':             '#00D4C8',
  'pump-fun':                '#00C853',
  'aave':                    '#9896FF',
  'lido-dao':                '#F0A500',
  'ether-fi':                '#6C5CE7',
  'syrup':                   '#F97316',
  'railgun':                 '#7C3AED',
  'sky':                     '#F4C430',
  'derive':                  '#D4420A',
  'kinetiq':                 '#00B4D8',
  'pendle':                  '#3D9BE9',
  'jupiter-exchange-solana': '#16A34A',
  'lighter':                 '#1a1a1a',
  'aerodrome-finance':       '#FF0420',
  'meteora':                 '#AB47BC',
  'gmx':                     '#4FC3F7',
  'fluid':                   '#00BFA5',
  'raydium':                 '#6366F1',
  'uniswap':                 '#FF007A',
  'helium':                  '#474DFF',
  'bluefin':                 '#1B9BE0',
  'ethena':                  '#1a1a2e',
};

const FALLBACK_PALETTE = [
  '#C96B2F','#4A6FA5','#3D6B4F','#9B59B6','#E67E22',
  '#1ABC9C','#E74C3C','#2980B9','#F39C12','#16A085',
];

function getCoinColor(d, idx) {
  return BRAND_COLORS[d.cgId] || FALLBACK_PALETTE[idx % FALLBACK_PALETTE.length];
}

let allData    = [];
let globalDays = 365;
let revDays    = 365;
let dailyDays  = 30;

let selectedCoins   = new Set();
let compareChartRev   = null;
let compareChartPE    = null;
let compareChartDaily = null;
let selectedCoinIdx   = null;

function buildCoinDetailChart(d, canvasId, showZones, days) {
  if (!d || !d.prices?.length) return;
  days = days || globalDays;
  const cutoff = Date.now() - days * 86400000;
  const src    = d.prices.filter(([ts]) => ts >= cutoff);
  const use    = src.length >= 2 ? src : d.prices;
  const labels = use.map(([ts]) => new Date(ts).toLocaleDateString('en-GB', { day:'numeric', month:'short' }));
  const prices = use.map(([,p]) => p);
  const pNow   = prices[prices.length - 1] || 1;

  let peArr = null;
  if (d.rev?.history?.length && d.mcap) {
    const rh = d.rev.history;
    const tmp = use.map(([ts, price]) => {
      const w = rh.filter(([t]) => t >= ts - 30*86400000 && t <= ts);
      if (w.length < 3) return null;
      const revAnn = w.reduce((s,[,v])=>s+v,0) * 12;
      return revAnn > 0 ? +((d.mcap * (price/pNow)) / revAnn).toFixed(2) : null;
    });
    if (tmp.filter(v=>v!==null).length >= use.length * 0.3) peArr = tmp;
  }

  const datasets = [{
    label: 'Price', data: prices, yAxisID: 'yP',
    borderColor: getCoinColor(d, d._idx),
    backgroundColor: 'transparent',
    borderWidth: 1.5, pointRadius: 0, tension: 0.4, fill: false,
  }];
  if (peArr) datasets.push({
    label: 'P/E', data: peArr, yAxisID: 'yPE',
    borderColor: '#9A7B5A',
    backgroundColor: 'transparent',
    borderWidth: 1.5, borderDash: [3,4], pointRadius: 0, tension: 0.4, spanGaps: true,
  });

  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const existing = Chart.getChart(canvas);
  if (existing) existing.destroy();

  canvas.width  = 1000;
  canvas.height = 220;
  canvas.style.width  = '100%';
  canvas.style.height = '220px';

  new Chart(canvas, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#2C2417',
          titleFont: { family:"'DM Mono',monospace", size:9 },
          bodyFont:  { family:"'DM Mono',monospace", size:10 },
          padding: 9,
          callbacks: {
            label: c => c.dataset.label === 'Price'
              ? ' price: ' + (fmtP(c.parsed.y)||'—')
              : ' p/e: '   + c.parsed.y.toFixed(1) + 'x',
          },
        },
        annotation: {
          annotations: (!showZones ? {} : (() => {
            const v = computeValuation(d);
            if (!v || !peArr) return {};
            return {
              zCheap: { type: 'box', yScaleID: 'yPE', yMin: 0, yMax: v.p20, backgroundColor: 'rgba(22,163,74,0.08)', borderWidth: 0 },
              zExpensive: { type: 'box', yScaleID: 'yPE', yMin: v.p80, yMax: v.p80 * 3, backgroundColor: 'rgba(220,38,38,0.07)', borderWidth: 0 },
              lP20: { type: 'line', yScaleID: 'yPE', yMin: v.p20, yMax: v.p20, borderColor: 'rgba(22,163,74,0.4)', borderWidth: 1, borderDash: [4, 3], label: { content: 'cheap < ' + v.p20.toFixed(0) + 'x', display: true, position: 'start', color: 'rgba(22,163,74,0.7)', font: { family: "'DM Mono',monospace", size: 8 }, backgroundColor: 'transparent', padding: 2 } },
              lP80: { type: 'line', yScaleID: 'yPE', yMin: v.p80, yMax: v.p80, borderColor: 'rgba(220,38,38,0.4)', borderWidth: 1, borderDash: [4, 3], label: { content: 'expensive > ' + v.p80.toFixed(0) + 'x', display: true, position: 'start', color: 'rgba(220,38,38,0.7)', font: { family: "'DM Mono',monospace", size: 8 }, backgroundColor: 'transparent', padding: 2 } },
            };
          })()),
        },
      },
      scales: {
        x: { grid: { color: 'rgba(180,160,130,0.1)' }, border: { display: false }, ticks: { font:{family:"'DM Mono',monospace",size:8}, color:'#9A7B5A', maxTicksLimit:8 } },
        yP: { position: 'left', grid: { color: 'rgba(180,160,130,0.1)' }, border: { display: false }, ticks: { font:{family:"'DM Mono',monospace",size:8}, color: getCoinColor(d, d._idx), callback: v => fmtP(v)||'' } },
        yPE: { position: 'right', display: !!peArr, grid: { display: false }, border: { display: false }, ticks: { font:{family:"'DM Mono',monospace",size:8}, color:'#9A7B5A', callback: v => v.toFixed(0)+'x' } },
      },
    },
  });
}

function fmt(n) {
  if (n == null || isNaN(n)) return null;
  if (n === 0) return '$0';
  const a = Math.abs(n);
  if (a >= 1e12) return '$' + (n/1e12).toFixed(2) + 'T';
  if (a >= 1e9)  return '$' + (n/1e9).toFixed(2)  + 'B';
  if (a >= 1e6)  return '$' + (n/1e6).toFixed(2)  + 'M';
  if (a >= 1e3)  return '$' + (n/1e3).toFixed(1)  + 'K';
  return '$' + n.toFixed(2);
}
function fmtP(n) {
  if (n == null) return null;
  if (n >= 1000) return '$' + n.toLocaleString('en-US', { maximumFractionDigits: 0 });
  if (n >= 1)    return '$' + n.toFixed(2);
  return '$' + n.toPrecision(4);
}
function cell(val, cls = 'num') {
  return val ? `<td class="${cls}">${val}</td>` : `<td class="na">—</td>`;
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab === 'compare') buildCompareChart();
  });
});

let sortKey = 'mcap', sortDir = 'desc';
function getSortVal(d, key) {
  switch(key) {
    case 'price': return d.price ?? -Infinity;
    case 'change24h': return d.change24h ?? -Infinity;
    case 'mcap': return d.mcap ?? -Infinity;
    case 'fdv': return d.fdv ?? -Infinity;
    case 'rev30d': return d.rev?.rev30d ?? -Infinity;
    case 'revAnn': return d.rev?.revAnn ?? -Infinity;
    case 'pe': return (d.rev?.revAnn>0&&d.mcap) ? d.mcap/d.rev.revAnn : Infinity;
    case 'fdve': return (d.rev?.revAnn>0&&d.fdv) ? d.fdv /d.rev.revAnn : Infinity;
    default: return -Infinity;
  }
}

function computeValuation(d) {
  if (!d.prices?.length || !d.mcap || !d.rev?.history?.length || !d.rev?.revAnn) return null;
  const rh = d.rev.history;
  const pNow = d.prices[d.prices.length - 1]?.[1] || 1;
  const cutoff = Date.now() - 365 * 86400000;
  const src = d.prices.filter(([ts]) => ts >= cutoff);
  if (src.length < 30) return null;
  const peHistory = src.map(([ts, prix]) => {
    const w = rh.filter(([t]) => t >= ts - 30*86400000 && t <= ts);
    if (w.length < 5) return null;
    const revAnn = w.reduce((s,[,v]) => s+v, 0) * 12;
    return revAnn > 0 ? (d.mcap * (prix / pNow)) / revAnn : null;
  }).filter(v => v !== null);
  if (peHistory.length < 30) return null;
  const sorted = [...peHistory].sort((a, b) => a - b);
  const p20 = sorted[Math.floor(sorted.length * 0.20)];
  const p80 = sorted[Math.floor(sorted.length * 0.80)];
  const current = d.mcap / d.rev.revAnn;
  if (current <= p20) return { label: 'Cheap', color: '#16a34a', bg: 'rgba(22,163,74,0.1)', p20, p80, current };
  else if (current <= p80) return { label: 'Fair', color: '#ca8a04', bg: 'rgba(202,138,4,0.1)', p20, p80, current };
  else return { label: 'Expensive', color: '#dc2626', bg: 'rgba(220,38,38,0.1)', p20, p80, current };
}

function renderTable() {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '<tr style="height:8px"><td colspan="13"></td></tr>';
  const sorted = [...allData].sort((a, b) => {
    const av = getSortVal(a, sortKey), bv = getSortVal(b, sortKey);
    if (av === bv) return 0;
    return sortDir === 'desc' ? bv - av : av - bv;
  });

  sorted.forEach(d => {
    const pe = d.rev?.revAnn > 0 && d.mcap ? d.mcap / d.rev.revAnn : null;
    const fdve = d.rev?.revAnn > 0 && d.fdv ? d.fdv / d.rev.revAnn : null;
    const chg = d.change24h;
    const tr = document.createElement('tr');
    tr.className = 'coin-row' + (d._idx === selectedCoinIdx ? ' selected-coin' : '');
    const wasSelected = d._idx === selectedCoinIdx;
    const _val = computeValuation(d);
    const _valCell = _val ? `<td class="num"><span style="font-weight:500;color:${_val.color};background:${_val.bg};padding:2px 8px;border-radius:4px;font-size:11px">${_val.label}</span></td>` : '<td class="na">—</td>';
    
    tr.innerHTML = `
      <td style="width:28px;text-align:center;color:var(--sienna);font-family:var(--mono);font-size:14px;padding-left:8px"><span class="row-toggle">${wasSelected ? '×' : '+'}</span></td>
      <td class="td-name"><img class="coin-logo" src="${d.logo||''}" alt="" /><div><div class="coin-name">${d.name}</div><div class="coin-sym">${d.symbol}</div></div></td>
      ${cell(fmtP(d.price))}
      <td class="${chg==null?'na':chg>=0?'pos':'neg'}">${chg==null?'—':(chg>=0?'+':'')+chg.toFixed(2)+'%'}</td>
      ${cell(fmt(d.mcap))}
      ${cell(fmt(d.fdv))}
      <td style="padding:12px 8px;vertical-align:middle">${(d.mcap && d.fdv && d.fdv > 0) ? `<div style="display:flex;align-items:center;gap:5px"><div style="width:36px;height:3px;background:var(--parchment);border-radius:2px;overflow:hidden;flex-shrink:0"><div style="width:${Math.min(100,(d.mcap/d.fdv)*100).toFixed(1)}%;height:100%;background:var(--sienna);border-radius:2px"></div></div><span style="font-family:var(--mono);font-size:9px;color:var(--sand);white-space:nowrap">${((d.mcap/d.fdv)*100).toFixed(0)}%</span></div>` : ''}</td>
      ${cell(fmt(d.rev?.rev30d))}
      ${cell(fmt(d.rev?.revAnn))}
      ${pe != null ? `<td class="num"><span style="font-weight:500;color:${pe < 10 ? '#16a34a' : pe < 25 ? '#ca8a04' : '#dc2626'};background:${pe < 10 ? 'rgba(22,163,74,0.1)' : pe < 25 ? 'rgba(202,138,4,0.1)' : 'rgba(220,38,38,0.1)'};padding:2px 6px;border-radius:4px">${pe.toFixed(1)}x</span></td>` : `<td class="na">—</td>`}
      ${fdve != null ? `<td class="num"><span style="font-weight:500;color:${fdve < 10 ? '#16a34a' : fdve < 25 ? '#ca8a04' : '#dc2626'};background:${fdve < 10 ? 'rgba(22,163,74,0.1)' : fdve < 25 ? 'rgba(202,138,4,0.1)' : 'rgba(220,38,38,0.1)'};padding:2px 6px;border-radius:4px">${fdve.toFixed(1)}x</span></td>` : `<td class="na">—</td>`}
      ${_valCell}
    `;
    tr.addEventListener('click', () => {
      const isOpen = d._idx === selectedCoinIdx;
      document.querySelectorAll('tbody tr.coin-row .row-toggle').forEach(s => s.textContent = '+');
      document.querySelectorAll('tbody tr.coin-row').forEach(r => r.classList.remove('selected-coin'));
      document.querySelectorAll('tr.coin-detail-row').forEach(r => r.remove());
      selectedCoinIdx = null;
      if (isOpen) return;
      selectedCoinIdx = d._idx;
      tr.classList.add('selected-coin');
      tr.querySelector('.row-toggle').textContent = '×';
      const detailRow = document.createElement('tr');
      detailRow.className = 'coin-detail-row';
      const canvasId = 'detail-canvas-' + d._idx;
      const zoneId = 'zone-toggle-' + d._idx;
      detailRow.innerHTML = `<td colspan="12" style="padding:12px 0;background:var(--cream);border-bottom:var(--border)"><div style="margin:0;border:var(--border);border-radius:6px;background:var(--white);padding:20px 24px;display:flex;flex-direction:column;gap:14px"><div style="display:flex;align-items:center;justify-content:space-between"><div style="display:flex;align-items:center;gap:16px"><span style="font-family:var(--mono);font-size:9px;color:var(--sienna);text-transform:uppercase;letter-spacing:.08em">Price · P/E — ${d.name}</span><span style="display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:9px;color:var(--sienna)"><span style="width:8px;height:8px;border-radius:50%;background:${getCoinColor(d,d._idx)};display:inline-block"></span>Price</span><span style="display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:9px;color:var(--sienna)"><span style="width:12px;height:2px;background:repeating-linear-gradient(90deg,#9A7B5A 0 3px,transparent 3px 6px);display:inline-block"></span>P/E</span></div><label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-family:var(--mono);font-size:9px;color:var(--sienna);user-select:none"><input type="checkbox" id="${zoneId}" style="accent-color:var(--umber);cursor:pointer" />Buy zones</label></div><div style="position:relative;height:340px"><canvas id="${canvasId}" style="position:absolute;inset:0;width:100%;height:100%"></canvas></div></div></td>`;
      tr.insertAdjacentElement('afterend', detailRow);
      const zoneChk = detailRow.querySelector('#' + zoneId);
      zoneChk.addEventListener('change', () => buildCoinDetailChart(d, canvasId, zoneChk.checked, globalDays));
      const canvasEl = detailRow.querySelector('canvas');
      const obs = new ResizeObserver(() => { if (canvasEl.offsetWidth > 0) { obs.disconnect(); buildCoinDetailChart(d, canvasId, false, globalDays); } });
      obs.observe(canvasEl);
    });
    tbody.appendChild(tr);
  });
}

function initSort() {
  document.querySelectorAll('thead th.sortable').forEach(th => {
    th.addEventListener('click', () => {
      const key = th.dataset.key;
      sortDir = sortKey === key ? (sortDir === 'desc' ? 'asc' : 'desc') : (key === 'pe' || key === 'fdve' ? 'asc' : 'desc');
      sortKey = key;
      document.querySelectorAll('thead th.sortable').forEach(t => { t.classList.remove('sort-active','sort-asc','sort-desc'); t.querySelector('.sort-icon').textContent = ''; });
      th.classList.add('sort-active', 'sort-'+sortDir);
      th.querySelector('.sort-icon').textContent = sortDir==='desc' ? '↓' : '↑';
      renderTable();
    });
  });
}

function buildCoinSelector() {
  const container = document.getElementById('coin-selector');
  container.innerHTML = '';
  allData.forEach((d, i) => {
    const chip = document.createElement('div');
    chip.className = 'coin-chip' + (selectedCoins.has(d._idx) ? ' active' : '');
    const color = getCoinColor(d, i);
    chip.style.borderColor = selectedCoins.has(d._idx) ? color : '';
    chip.style.background = selectedCoins.has(d._idx) ? color + '22' : '';
    chip.style.color = selectedCoins.has(d._idx) ? color : '';
    chip.innerHTML = `<img src="${d.logo||''}" alt=""/>${d.symbol}`;
    chip.addEventListener('click', () => {
      if (selectedCoins.has(d._idx)) selectedCoins.delete(d._idx);
      else selectedCoins.add(d._idx);
      buildCoinSelector();
      buildCompareChart();
    });
    container.appendChild(chip);
  });
}

function getMetricSeries(d, metric, days) {
  const cutoff = Date.now() - days * 86400000;
  if (metric === 'rev30d') {
    const rh = (d.rev?.history || []).filter(([ts]) => ts >= cutoff);
    const data = rh.map(([ts]) => {
      const w = d.rev.history.filter(([t]) => t >= ts - 30*86400000 && t <= ts);
      return w.length >= 3 ? +w.reduce((s,[,v])=>s+v,0).toFixed(0) : null;
    });
    return { labels: rh.map(([ts]) => new Date(ts).toLocaleDateString('en-GB', { day:'numeric', month:'short' })), data };
  }
  if (metric === 'pe') {
    const src = (d.prices || []).filter(([ts]) => ts >= cutoff);
    const pNow = d.prices[d.prices.length - 1]?.[1] || 1;
    const data = src.map(([ts, prix]) => {
      const w = d.rev.history.filter(([t]) => t >= ts - 30*86400000 && t <= ts);
      if (w.length < 3) return null;
      const revAnn = w.reduce((s,[,v])=>s+v,0) * 12;
      return revAnn > 0 ? +((d.mcap * (prix/pNow)) / revAnn).toFixed(2) : null;
    });
    return { labels: src.map(([ts]) => new Date(ts).toLocaleDateString('en-GB', { day:'numeric', month:'short' })), data };
  }
  if (metric === 'rev_daily') {
    const rh = (d.rev?.history || []).filter(([ts]) => ts >= cutoff);
    return { labels: rh.map(([ts]) => new Date(ts).toLocaleDateString('en-GB', { day:'numeric', month:'short' })), data: rh.map(([, v]) => v || 0) };
  }
  return { labels: [], data: [] };
}

function makeCompareChart(canvasId, legendId, metric, active, existingChart, days) {
  const legend = document.getElementById(legendId);
  legend.innerHTML = '';
  const isDaily = metric === 'rev_daily';
  const isRevFlag = metric === 'rev30d' || metric === 'rev_daily';
  const tickCb = isRevFlag ? v => fmt(v)||'' : v => v.toFixed(0)+'x';
  const ttCb = isRevFlag ? v => fmt(v)||'—' : v => v.toFixed(1)+'x';
  const cutoff = Date.now() - days * 86400000;
  const tsRaw = new Set();
  active.forEach(d => { (d.prices || []).filter(([ts]) => ts >= cutoff).forEach(([ts]) => tsRaw.add(Math.round(ts/86400000)*86400000)); });
  const sortedTs = Array.from(tsRaw).sort((a,b)=>a-b);
  const sharedLabels = sortedTs.map(ts => new Date(ts).toLocaleDateString('en-GB', { day:'numeric', month:'short' }));

  const datasets = active.map(d => {
    const color = getCoinColor(d, d._idx);
    const use = (d.prices || []).filter(([ts]) => ts >= cutoff);
    const pNow = use.length ? use[use.length-1][1] || 1 : 1;
    const valueMap = new Map();
    if (metric === 'rev30d') {
      use.forEach(([ts]) => { const w = d.rev.history.filter(([t]) => t >= ts - 30*86400000 && t <= ts); if (w.length >= 3) valueMap.set(Math.round(ts/86400000)*86400000, +w.reduce((s,[,v])=>s+v,0).toFixed(0)); });
    } else if (metric === 'pe') {
      use.forEach(([ts, prix]) => { const w = d.rev.history.filter(([t]) => t >= ts - 30*86400000 && t <= ts); if (w.length >= 3) { const ra = w.reduce((s,[,v])=>s+v,0)*12; if (ra>0) valueMap.set(Math.round(ts/86400000)*86400000, +((d.mcap*(prix/pNow))/ra).toFixed(2)); } });
    } else if (metric === 'rev_daily') {
      (d.rev?.history || []).filter(([ts]) => ts >= cutoff).forEach(([ts, v]) => valueMap.set(Math.round(ts/86400000)*86400000, v||0));
    }
    return { label: d.symbol, data: sortedTs.map(ts => valueMap.get(ts) ?? null), borderColor: color, backgroundColor: isDaily ? color : 'transparent', borderWidth: isDaily ? 0 : 1.5, pointRadius: 0, tension: 0.35, spanGaps: true };
  });

  active.forEach(d => { const item = document.createElement('div'); item.className = 'compare-legend-item'; item.innerHTML = `<span class="compare-legend-dot" style="background:${getCoinColor(d,d._idx)}"></span>${d.name}`; legend.appendChild(item); });

  if (existingChart) {
    existingChart.data.labels = sharedLabels;
    existingChart.data.datasets = datasets;
    existingChart.update('none');
    return existingChart;
  }

  const canvas = document.getElementById(canvasId);
  return new Chart(canvas, {
    type: isDaily ? 'bar' : 'line',
    data: { labels: sharedLabels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { display: false }, tooltip: { backgroundColor: '#2C2417', titleFont: { family:"'DM Mono',monospace" }, bodyFont: { family:"'DM Mono',monospace" }, callbacks: { label: c => ` ${c.dataset.label}: ${ttCb(c.parsed.y)}` } } },
      scales: { x: { grid: { color: 'rgba(180,160,130,0.1)' }, ticks: { font:{family:"'DM Mono',monospace",size:9}, color:'#9A7B5A', maxTicksLimit:8 } }, y: { ticks: { font:{family:"'DM Mono',monospace",size:9}, color:'#9A7B5A', callback: tickCb } } }
    }
  });
}

function buildCompareChart() {
  const active = allData.filter(d => selectedCoins.has(d._idx));
  if (!active.length) return;
  compareChartPE = makeCompareChart('compare-chart-pe', 'compare-legend-pe', 'pe', active, compareChartPE, globalDays);
  compareChartRev = makeCompareChart('compare-chart-rev', 'compare-legend-rev', 'rev30d', active, compareChartRev, revDays);
  compareChartDaily = makeCompareChart('compare-chart-daily', 'compare-legend-daily', 'rev_daily', active, compareChartDaily, dailyDays);
}

document.getElementById('global-filters').querySelectorAll('.tf-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    globalDays = parseInt(btn.dataset.days); revDays = globalDays; dailyDays = globalDays;
    ['#global-filters', '#header-days-filter', '#rev-filters', '#daily-filters'].forEach(sel => { document.querySelectorAll(sel + ' .tf-btn').forEach(b => b.classList.toggle('active', parseInt(b.dataset.days) === globalDays)); });
    buildCompareChart(); redrawOpenDetailCharts();
  });
});

document.getElementById('header-days-filter').querySelectorAll('.tf-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    globalDays = parseInt(btn.dataset.days); revDays = globalDays; dailyDays = globalDays;
    ['#global-filters', '#header-days-filter', '#rev-filters', '#daily-filters'].forEach(sel => { document.querySelectorAll(sel + ' .tf-btn').forEach(b => b.classList.toggle('active', parseInt(b.dataset.days) === globalDays)); });
    buildCompareChart(); redrawOpenDetailCharts();
  });
});

document.addEventListener('click', e => {
  const btn = e.target.closest('#rev-filters .tf-btn');
  if (btn) { revDays = parseInt(btn.dataset.days); document.querySelectorAll('#rev-filters .tf-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); buildCompareChart(); }
  const btn2 = e.target.closest('#daily-filters .tf-btn');
  if (btn2) { dailyDays = parseInt(btn2.dataset.days); document.querySelectorAll('#daily-filters .tf-btn').forEach(b => b.classList.remove('active')); btn2.classList.add('active'); buildCompareChart(); }
});

function redrawOpenDetailCharts() {
  document.querySelectorAll('[id^="detail-canvas-"]').forEach(canvas => {
    if (canvas.offsetWidth > 0) {
      const idx = parseInt(canvas.id.replace('detail-canvas-', ''));
      const d = allData.find(x => x._idx === idx);
      if (d) buildCoinDetailChart(d, canvas.id, document.getElementById('zone-toggle-' + idx)?.checked, globalDays);
    }
  });
}

async function init() {
  const loadEl = document.getElementById('loading');
  try {
    const res = await fetch('/api/batch', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(COINS) });
    if (!res.ok) throw new Error('Server HTTP ' + res.status);
    const data = await res.json();
    let ok = 0;
    data.forEach((d, i) => { if (!d.error) { d._idx = i; allData.push(d); ok++; } });
    const defaultIds = ['hyperliquid', 'pump-fun', 'syrup'];
    allData.forEach(d => { if (defaultIds.includes(d.cgId)) selectedCoins.add(d._idx); });
    loadEl.style.display = 'none';
    initSort(); renderTable(); buildCoinSelector(); buildCompareChart();
    const _now = new Date();
    document.getElementById('update-time').textContent = ok+'/'+COINS.length+' coins · updated ' + _now.toLocaleDateString('en-GB',{day:'2-digit',month:'short'}) + ' ' + _now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  } catch(e) {
    loadEl.style.cssText = 'animation:none;color:#8B3A3A;padding:60px 0;text-align:center;font-family:var(--mono);';
    loadEl.textContent = '❌ ' + e.message;
  }
}
init();
</script>
</body>
